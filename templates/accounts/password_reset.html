{% extends 'base.html' %}

{% block title %}Восстановление пароля — Cloud Balance{% endblock %}

{% block content %}
<div class="page">
    <div class="container">
        <div class="page_wrap type">
            <div class="col">
                <span class="block_title">Восстановление пароля</span>
                <p class="page-desc">Укажите email — мы вышлем ссылку для сброса пароля</p>
            </div>
            <div class="col">
                <div class="form">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form_row">
                            <input type="email" name="email" placeholder="Электронная почта" required autofocus>
                        </div>
                        <button type="submit" class="btn dp blue">Отправить ссылку</button>
                        <p style="margin-top:16px;font-size:14px;color:#666;">
                            <a href="{% url 'login' %}" style="color:#0A66C2;">Вернуться к входу</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
