{% load static %}
<section class="s-steps">
    <div class="container">
        <ul class="steps_list">
            <li {% if active_step == 'profile' %}class="active"{% endif %}>
                <a href="{% url 'profile' %}">
                    <div class="step_icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21C4 16.5817 7.58172 13 12 13C16.4183 13 20 16.5817 20 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                    </div>
                    <div class="step_info">
                        <span>ПРОФИЛЬ</span>
                        <p>Управление вашим профилем и настройками</p>
                    </div>
                </a>
            </li>
            <li {% if active_step == 'services' %}class="active"{% endif %}>
                <a href="{% url 'services' %}">
                    <div class="step_icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 21H16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M12 17V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                    </div>
                    <div class="step_info">
                        <span>УПРАВЛЕНИЕ ПРОЕКТАМИ И УСЛУГАМИ</span>
                        <p>Выберите подходящий тариф и услуги</p>
                    </div>
                </a>
            </li>
            <li {% if active_step == 'company' %}class="active"{% endif %}>
                <a href="{% url 'company' %}">
                    <div class="step_icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 6C4 4.89543 4.89543 4 6 4H18C19.1046 4 20 4.89543 20 6V14C20 15.1046 19.1046 16 18 16H13L8 20V16H6C4.89543 16 4 15.1046 4 14V6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="12" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/></svg>
                    </div>
                    <div class="step_info">
                        <span>КОМПАНИЯ</span>
                        <p>Реквизиты и данные вашей организации</p>
                    </div>
                </a>
            </li>
        </ul>
    </div>
</section>
